<html>

<head>
    <title>Contact - Urban Vogue</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
    }

    .header-container {
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
    }

    .sub-header {
        background-color: #1e381e;
        padding: 5px 20px;
        color: white;
        text-align: center;
    }

    .header {
        background-color: #f8f4dc;
        color: #b18e35;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
    }

    .brandname {
        font-size: 30px;
        font-weight: bold;
    }

    .nav-links {
        display: flex;
        gap: 20px;
    }

    .nav-links a {
        text-decoration: none;
        color: #b18e35;
        font-weight: bold;
        transition: color 0.3s;
    }

    .nav-links a:hover {
        color: #ff6600;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
    }

    .container {
        max-width: 500px;
        margin: 50px auto;
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        margin-top: 130px;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #b18e35;
    }

    .form-group {
        margin-bottom: 15px;
    }

    .form-group label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
    }

    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;

        border-radius: 5px;
        font-size: 16px;
    }

    .form-group textarea {
        height: 100px;
    }

    .error {
        color: red;
        font-size: 14px;
        margin-top: 5px;
    }

    .btn {
        width: 100%;
        padding: 10px;
        background-color: #b18e35;
        color: white;
        border: none;
        font-size: 18px;
        font-weight: bold;
        border-radius: 5px;
        cursor: pointer;
        transition: background 0.3s;
    }

    .btn:hover {
        background-color: #ff6600;
    }

    .back-link {
        text-align: center;
        margin-top: 10px;
    }

    .back-link a {
        color: #b18e35;
        text-decoration: none;
        font-weight: bold;
    }

    .back-link a:hover {
        color: #ff6600;
    }
</style>

<body>
    <div class="header-container">
        <div class="sub-header">
            <div>Shop At Special Prices | <a href="#" style="color: white;">Discover Now</a></div>
        </div>

        <div class="header">
            <div class="brandname">YR JEWELLERS</div>
            <nav class="nav-links">
                <a href="as.html">Home</a> |
                <a href="as_login.html">Login</a> |
                <a href="as.register.html">Register</a> |
                <a href="as_contact.html">Contact</a>
            </nav>
        </div>
    </div>

    <div class="container">
        <h2>Contact Us</h2>
        <form id="contactForm">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="contactName">
                <span class="error" id="nameError"></span>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="contactEmail">
                <span class="error" id="emailError"></span>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="contactMessage"></textarea>
                <span class="error" id="messageError"></span>
            </div>
            <button type="button" class="btn" onclick="validateContactForm()">Send Message</button>
        </form>

        <div class="back-link">
            <p><a href="as.html">Back to Home</a></p>
        </div>
    </div>

    <script>
        function validateContactForm() {
            let name = document.getElementById('contactName').value.trim();
            let email = document.getElementById('contactEmail').value.trim();
            let message = document.getElementById('contactMessage').value.trim();

            document.getElementById('nameError').innerText = "";
            document.getElementById('emailError').innerText = "";
            document.getElementById('messageError').innerText = "";

            let isValid = true;

            if (name === "" || !/^[A-Za-z ]+$/.test(name)) {
                document.getElementById('nameError').innerText = "Enter a valid name.";
                isValid = false;
            }

            if (email === "" || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                document.getElementById('emailError').innerText = "Enter a valid email address.";
                isValid = false;
            }

            if (message === "") {
                document.getElementById('messageError').innerText = "Message cannot be empty.";
                isValid = false;
            }

            if (isValid) {
                alert("Your message has been sent successfully!");
                document.getElementById('contactForm').reset();
            }
        }
    </script>
</body>

</html>
