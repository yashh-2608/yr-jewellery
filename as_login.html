<html>

<head>

    <title>Login - Urban Vogue</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .header-container {
            position: fixed;
            top: 0;
            width: 100%;
        }

        .sub-header {
            background-color: #1e381e;
            padding: 5px 20px;
            color: white;
            text-align: center;
        }

        .header {
            background-color: #f8f4dc;
            color: #b18e35;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .brandname {
            font-size: 30px;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #b18e35;
            font-weight: bold;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #ff0000;
        }

        .banner {
            margin-top: 90px;
        }

        .container {
            max-width: 400px;
            margin: 50px auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 130px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #b18e35;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background-color: #b18e35;
            color: white;
            border: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #ff6600;
        }

        .register-link {
            text-align: center;
            margin-top: 10px;
        }

        .register-link a {
            color: #b18e35;
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover {
            color: #ff6600;
        }
    </style>
</head>

<body>
    <div class="header-container">
        <div class="sub-header">
            <div>Shop At Special Prices | <a href="#" style="color: white;">Discover Now</a></div>
        </div>

        <div class="header">
            <div class="brandname">YR JEWELLERS</div>
            <nav class="nav-links">
                <a href="as.html">Home</a> |
                <a href="as_login.html">Login</a> |
                <a href="as.register.html">Register</a> |
                <a href="as_contact.html">Contact</a>
            </nav>
        </div>
    </div>


    <div class="container">
        <h2>Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail">
                <span class="error" id="loginEmailError"></span>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword">
                <span class="error" id="loginPasswordError"></span>
            </div>
            <button type="button" class="btn" onclick="loginUser()">Login</button>
        </form>

        <div class="register-link">
            <p>Don't have an account? <a href="as.register.html">Register here</a></p>
            <p>Want to logout? <a href="#" onclick="logoutUser()">Logout</a></p>
        </div>
    </div>

    <script>
        function loginUser() {
            let email = document.getElementById('loginEmail').value.trim();
            let password = document.getElementById('loginPassword').value;

            document.getElementById('loginEmailError').innerText = "";
            document.getElementById('loginPasswordError').innerText = "";

            if (email === "" || password === "") {
                if (email === "") document.getElementById('loginEmailError').innerText = "Email is required.";
                if (password === "") document.getElementById('loginPasswordError').innerText = "Password is required.";
                return;
            }

            let userData = JSON.parse(localStorage.getItem("registeredUser"));

            if (!userData || userData.email !== email || userData.password !== password) {
                document.getElementById('loginEmailError').innerText = "Invalid email or password.";
                return;
            }

            alert("Login successful! Welcome, " + userData.name);
            window.location.href = "as.html";
        }
        window.onload = function () {
            const user = localStorage.getItem('registeredUser');
            if (user) {
                document.getElementById('logoutLink').style.display = 'block';
            }
        };

        function logoutUser() {
            localStorage.removeItem('registeredUser');
            alert('You have logged out successfully!');
            window.location.href = 'as.html';
        };

    </script>
</body>

</html>
