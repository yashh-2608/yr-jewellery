<html>

<head>
    <title>Register - Urban Vogue</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .header-container {
            position: fixed;
            top: 0;
            width: 100%;
        }

        .sub-header {
            background-color: #1e381e;
            padding: 5px 20px;
            color: white;
            text-align: center;
        }

        .header {
            background-color: #f8f4dc;
            color: #b18e35;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .brandname {
            font-size: 30px;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #b18e35;
            font-weight: bold;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #ff6600;
        }

        .banner {
            margin-top: 90px;
        }

        .container {
            max-width: 400px;
            margin: 50px auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 130px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #b18e35;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background-color: #b18e35;
            color: white;
            border: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #ff6600;
        }
    </style>
</head>

<body>
    <div class="header-container">
        <div class="sub-header">
            <div>Shop At Special Prices | <a href="#" style="color: white;">Discover Now</a></div>
        </div>

        <div class="header">
            <div class="brandname">YR JEWELLERS</div>
            <nav class="nav-links">
                <a href="as.html">Home</a> |
                <a href="as_login.html">Login</a> |
                <a href="as.register.html">Register</a> |
                <a href="as_contact.html">Contact</a>
            </nav>
        </div>
    </div>


    <div class="container">
        <h2>Register</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="name">
                <span class="error" id="nameError"></span>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email">
                <span class="error" id="emailError"></span>
            </div>
            <div class="form-group">
                <label>Contact No.</label>
                <input type="text" id="contact">
                <span class="error" id="contactError"></span>
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="dob">
                <span class="error" id="dobError"></span>
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" id="address">
                <span class="error" id="addressError"></span>
            </div>
            <div class="form-group">
                <label>State</label>
                <input type="text" id="state">
                <span class="error" id="stateError"></span>
            </div>
            <div class="form-group">
                <label>Country</label>
                <input type="text" id="country">
                <span class="error" id="countryError"></span>
            </div>
            <div class="form-group">
                <label>Zip Code</label>
                <input type="text" id="zip">
                <span class="error" id="zipError"></span>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password">
                <span class="error" id="passwordError"></span>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword">
                <span class="error" id="confirmPasswordError"></span>
            </div>
            <button type="button" class="btn" onclick="registerUser()">Register</button>
        </form>
    </div>

    <script>
        function registerUser() {
            let isValid = true;

            let name = document.getElementById('name').value.trim();
            let email = document.getElementById('email').value.trim();
            let contact = document.getElementById('contact').value.trim();
            let dob = document.getElementById('dob').value;
            let address = document.getElementById('address').value.trim();
            let state = document.getElementById('state').value.trim();
            let country = document.getElementById('country').value.trim();
            let zip = document.getElementById('zip').value.trim();
            let password = document.getElementById('password').value;
            let confirmPassword = document.getElementById('confirmPassword').value;

            document.querySelectorAll('.error').forEach(el => el.innerText = "");

            let nameRegex = /^[A-Za-z ]+$/;
            let emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            let contactRegex = /^\d{10}$/;
            let addressRegex = /^[A-Za-z0-9 ]+$/;
            let stateCountryRegex = /^[A-Za-z]+$/;
            let zipRegex = /^\d{6}$/;
            let passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;

            if (!name.match(nameRegex)) {
                document.getElementById('nameError').innerText = "Only alphabets allowed.";
                isValid = false;
            }

            if (!email.match(emailRegex)) {
                document.getElementById('emailError').innerText = "Invalid email.";
                isValid = false;
            }

            if (!contact.match(contactRegex)) {
                document.getElementById('contactError').innerText = "Must be a 10-digit number.";
                isValid = false;
            }

            let dobDate = new Date(dob);
            let today = new Date();
            let age = today.getFullYear() - dobDate.getFullYear();
            if (age < 12) {
                document.getElementById('dobError').innerText = "You must be at least 12 years old.";
                isValid = false;
            }

            if (!address.match(addressRegex)) {
                document.getElementById('addressError').innerText = "No special characters allowed.";
                isValid = false;
            }

            if (!state.match(stateCountryRegex)) {
                document.getElementById('stateError').innerText = "Only alphabets allowed.";
                isValid = false;
            }

            if (!country.match(stateCountryRegex)) {
                document.getElementById('countryError').innerText = "Only alphabets allowed.";
                isValid = false;
            }

            if (!zip.match(zipRegex)) {
                document.getElementById('zipError').innerText = "Must be a 6-digit number.";
                isValid = false;
            }

            if (!password.match(passwordRegex)) {
                document.getElementById('passwordError').innerText = "Must contain 1 uppercase, 1 lowercase, 1 number, 1 special character.";
                isValid = false;
            }

            if (password !== confirmPassword) {
                document.getElementById('confirmPasswordError').innerText = "Passwords do not match.";
                isValid = false;
            }

            if (!isValid) return;

            let userData = { name, email, contact, dob, address, state, country, zip, password };
            localStorage.setItem("registeredUser", JSON.stringify(userData));

            alert("Registration successful! Proceed to login.");
            window.location.href = "as_login.html";
        }
    </script>
</body>

</html>
